<!DOCTYPE html>
<html>
<head>
    <title>Hamma Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="bg-btn" onclick="changeBg('linear-gradient(135deg, #1f1c2c, #928dab)')"></div>
        <div class="bg-btn" onclick="changeBg('linear-gradient(135deg, #0f2027, #203a43, #2c5364)')"></div>
        <div class="bg-btn" onclick="changeBg('linear-gradient(135deg, #b3103e, #d35639)')"></div>
    </div>
    
    <div class="chat-container" id="bg-box">
        <h1>Hamma Chat</h1>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="username" placeholder="Name">
            <input type="text" id="message" placeholder="Type a message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const username = document.getElementById('username');
        const message = document.getElementById('message');
        const sendBtn = document.getElementById('send-btn');
        const bgBox = document.getElementById('bg-box');

        function changeBg(gradient) { bgBox.style.background = gradient; }

        sendBtn.onclick = () => {
            if(message.value) {
                socket.emit('chat-message', { name: username.value || 'User', text: message.value });
                message.value = '';
            }
        };

        socket.on('chat-message', (data) => {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<strong>${data.name}:</strong> ${data.text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
