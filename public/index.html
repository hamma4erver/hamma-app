<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Chatting</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background-color: #d9383a;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 70px;
            background-color: #0d0f17;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25px;
            gap: 20px;
            z-index: 10;
        }

        .sidebar-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #1a1d28;
            border: none;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .sidebar-btn:hover {
            background-color: #2a2e3d;
            transform: scale(1.05);
        }

        .sidebar-btn.active {
            background-color: #d9383a;
        }

        .sidebar-btn.ai-mode {
            background-color: #1d2538;
            color: #4da6ff;
            font-weight: bold;
            font-size: 13px;
        }

        .sidebar-btn.ai-mode.active {
            background-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.6);
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* Header Styling - Center Aligned */
        .chat-header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px 20px 20px;
            position: relative;
            width: 100%;
        }

        .chat-title {
            color: #10b981;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-align: center;
            margin: 0 auto;
        }

        .user-profile {
            position: absolute;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #4b5563;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .username {
            font-size: 14px;
            font-weight: 500;
        }

        /* Message Display Container */
        .chat-messages {
            flex: 1;
            background: linear-gradient(180deg, #8b1d2c 0%, #6b1522 100%);
            border-radius: 24px;
            padding: 25px;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* Scrollbar Styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background-color: #2563eb;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            align-self: flex-start;
            background-color: #1f2937;
            color: #f3f4f6;
            border-bottom-left-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background-color: #064e3b;
            color: #a7f3d0;
            border: 1px solid #059669;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 11px;
            opacity: 0.75;
            margin-bottom: 4px;
            font-weight: 600;
        }

        /* Input Bar Container */
        .chat-input-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #message-input {
            flex: 1;
            background-color: #1a233a;
            border: 1px solid #2d3748;
            border-radius: 16px;
            padding: 16px 22px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        #message-input:focus {
            border-color: #3b82f6;
        }

        #message-input::placeholder {
            color: #64748b;
        }

        #send-btn {
            background-color: #06b6d4;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 0 28px;
            height: 52px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        #send-btn:hover {
            background-color: #0891b2;
        }

        #send-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <button class="sidebar-btn active" title="Global Chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </button>
            <button class="sidebar-btn ai-mode" id="ai-toggle-btn" title="Hamma AI Assistant">
                🤖 AI
            </button>
        </div>

        <!-- Main Chat Panel -->
        <div class="chat-main">
            <!-- Header Section -->
            <header class="chat-header">
                <h1 class="chat-title">Just Chatting</h1>
                <div class="user-profile">
                    <div class="avatar">👤</div>
                    <span class="username" id="display-username">Admin</span>
                </div>
            </header>

            <!-- Messages Window -->
            <div id="chat-messages" class="chat-messages">
                <div class="message ai">
                    <div class="message-sender">Hamma AI 🤖</div>
                    Welcome to your private session. Your messages are completely secure and visible only to you. Ask me anything!
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-container">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">Ask ↵</button>
            </div>
        </div>
    </div>

    <!-- Socket.io & Logic -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
