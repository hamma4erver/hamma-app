<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Chatting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <button class="sidebar-btn active">💬</button>
            <button class="sidebar-btn ai-mode" id="ai-toggle-btn">🤖 AI</button>
        </div>

        <div class="chat-main">
            <header class="chat-header" style="justify-content: center;">
                <h1 class="chat-title" style="margin: 0 auto; text-align: center;">Just Chatting</h1>
            </header>

            <div id="chat-messages" class="chat-messages">
                <!-- الرسائل -->
            </div>

            <div class="chat-input-container">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">Enter ↵</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
