<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Hamma Chat</title>
    <!-- السطر السحري لتعديل مقاسات التليفون ومنع الـ Zoom الزائد -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- الـ Sidebar الخاصة بتبديل الخلفيات الكاسحة -->
    <div class="sidebar">
        <div class="bg-btn" style="background: linear-gradient(135deg, #1e3c72, #2a5298);" onclick="changeBg('linear-gradient(135deg, #1e3c72, #2a5298)')"></div>
        <div class="bg-btn" style="background: linear-gradient(135deg, #667eea, #764ba2);" onclick="changeBg('linear-gradient(135deg, #667eea, #764ba2)')"></div>
        <div class="bg-btn" style="background: linear-gradient(135deg, #ff9a9e, #fecfef);" onclick="changeBg('linear-gradient(135deg, #ff9a9e, #fecfef)')"></div>
        <div class="bg-btn" style="background: #050505; border: 2px solid #555;" onclick="changeBg('#050505')"></div>
    </div>

    <!-- حاوية الشات الرئيسية -->
    <div class="chat-container">
        <h1>Hamma Chat</h1>
        <div id="chat-box"></div>
        
        <div class="input-area">
            <input type="text" id="username" placeholder="الاسم...">
            <input type="text" id="message" placeholder="اكتب رسالتك هنا...">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');

        function sendMessage() {
            const user = document.getElementById('username').value || 'مجهول';
            const msg = document.getElementById('message').value;
            if(msg.trim() !== "") {
                socket.emit('chat-message', { user, msg });
                document.getElementById('message').value = "";
            }
        }

        socket.on('chat-message', (data) => {
            const msgElement = document.createElement('div');
            msgElement.classList.add('msg');
            msgElement.innerHTML = `<strong>${data.user}:</strong> ${data.msg}`;
            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        function changeBg(bg) {
            document.body.style.background = bg;
        }
    </script>
</body>
</html>
